name: Despliegue Nutrione a face-ubb

on:
  workflow_dispatch:

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Instalar dependencias OpenVPN, SSH, sshpass y expect
        run: |
          sudo apt update -qq > /dev/null 2>&1
          sudo apt install -y -qq openvpn openvpn-systemd-resolved openssh-client sshpass expect

      - name: Crear archivo de configuración OpenVPN
        run: echo "${{ secrets.OPENVPN_CONFIG }}" > /dev/shm/nutrione.ovpn

      - name: Conexión a la VPN de la UBB
        uses: kota65535/github-openvpn-connect-action@v3.1.0
        timeout-minutes: 2
        continue-on-error: false
        with:
          config_file: /dev/shm/nutrione.ovpn
          username: ${{ secrets.OPENVPN_USERNAME }}
          password: ${{ secrets.OPENVPN_PASSWORD }}

      - name: Eliminar archivo OpenVPN temporal
        if: always()
        run: rm -f /dev/shm/nutrione.ovpn

      - name: Crear archivos .env temporales en GitHub Actions
        run: |
          printf '%s' "${{ secrets.ENV_FRONTEND_CONTENT }}" > /dev/shm/frontend.env.tmp
          printf '%s' "${{ secrets.ENV_BACKEND_CONTENT }}" > /dev/shm/backend.env.tmp
        shell: bash

      - name: Copiar archivos .env temporales al servidor como mcerda
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PASSWORD: ${{ secrets.PROD_PASSWORD }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
        run: |
          echo "Copiando .env temporales a /tmp del servidor"

          sshpass -p "$PROD_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            -P "$PROD_PORT" \
            /dev/shm/frontend.env.tmp "$PROD_USER@$PROD_HOST:/tmp/nutrione_frontend.env.tmp"

          sshpass -p "$PROD_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            -P "$PROD_PORT" \
            /dev/shm/backend.env.tmp "$PROD_USER@$PROD_HOST:/tmp/nutrione_backend.env.tmp"

      - name: Mover archivos .env usando su root dentro del servidor
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PASSWORD: ${{ secrets.PROD_PASSWORD }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          ROOT_PASSWORD: ${{ secrets.ROOT_PASSWORD }}
          REMOTE_REPO_NAME: ${{ secrets.NOMBRE_REPOSITORIO }}
        run: |
          export APP_DIR_REMOTE="/home/$PROD_USER/$REMOTE_REPO_NAME"

          expect <<'EOF'
            set timeout 90

            spawn ssh -tt -o StrictHostKeyChecking=no -p $env(PROD_PORT) $env(PROD_USER)@$env(PROD_HOST)

            expect {
              -re "(?i)(password|contraseña|clave).*:" {
                send -- "$env(PROD_PASSWORD)\r"
              }
              timeout {
                puts "ERROR: No apareció el prompt de contraseña SSH"
                exit 1
              }
            }

            expect {
              -re {[$] ?$} {}
              -re {> ?$} {}
              timeout {
                puts "ERROR: No se pudo entrar como usuario normal"
                exit 1
              }
            }

            send -- "su -\r"

            expect {
              -re "(?i)(password|contraseña|clave).*:" {
                send -- "$env(ROOT_PASSWORD)\r"
              }
              timeout {
                puts "ERROR: No apareció el prompt de contraseña root"
                exit 1
              }
            }

            expect {
              -re {# ?$} {}
              timeout {
                puts "ERROR: No se pudo entrar como root con su"
                exit 1
              }
            }

            send -- "mkdir -p $env(APP_DIR_REMOTE)/frontend $env(APP_DIR_REMOTE)/backend/src/config\r"

            expect {
              -re {# ?$} {}
              timeout {
                puts "ERROR: No se pudieron crear las carpetas"
                exit 1
              }
            }

            send -- "mv /tmp/nutrione_frontend.env.tmp $env(APP_DIR_REMOTE)/frontend/.env\r"

            expect {
              -re {# ?$} {}
              timeout {
                puts "ERROR: No se pudo mover el .env del frontend"
                exit 1
              }
            }

            send -- "mv /tmp/nutrione_backend.env.tmp $env(APP_DIR_REMOTE)/backend/src/config/.env\r"

            expect {
              -re {# ?$} {}
              timeout {
                puts "ERROR: No se pudo mover el .env del backend"
                exit 1
              }
            }

            send -- "chown -R $env(PROD_USER):$env(PROD_USER) $env(APP_DIR_REMOTE)\r"

            expect {
              -re {# ?$} {}
              timeout {
                puts "ERROR: No se pudieron ajustar los dueños del proyecto"
                exit 1
              }
            }

            send -- "chmod 600 $env(APP_DIR_REMOTE)/frontend/.env $env(APP_DIR_REMOTE)/backend/src/config/.env\r"

            expect {
              -re {# ?$} {}
              timeout {
                puts "ERROR: No se pudieron ajustar los permisos de los .env"
                exit 1
              }
            }

            send -- "exit\r"

            expect {
              -re {[$] ?$} {}
              -re {> ?$} {}
              timeout {
                puts "ERROR: No se pudo salir de root"
                exit 1
              }
            }

            send -- "exit\r"
            expect eof
          EOF

      - name: Eliminar archivos .env temporales del runner
        if: always()
        run: |
          rm -f /dev/shm/frontend.env.tmp
          rm -f /dev/shm/backend.env.tmp

      - name: Ejecutar despliegue remoto como mcerda
        env:
          PASS_GIT_COMMIT_SHA: ${{ github.sha }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PASSWORD: ${{ secrets.PROD_PASSWORD }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          REMOTE_REPO_NAME: ${{ secrets.NOMBRE_REPOSITORIO }}
        run: |
          sshpass -p "$PROD_PASSWORD" ssh \
          -q \
          -o StrictHostKeyChecking=no \
          -p "$PROD_PORT" \
          "$PROD_USER@$PROD_HOST" \
          bash -s -- \
          "$PASS_GIT_COMMIT_SHA" \
          "$REMOTE_REPO_NAME" \
          << 'EOF'
            set -euo pipefail

            ARG_GIT_COMMIT_SHA="$1"
            ARG_REPO_NAME="$2"

            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              echo "Cargando nvm..."
              . "$NVM_DIR/nvm.sh"
            else
              echo "Advertencia: nvm no encontrado. Asumiendo node/npm en PATH."
            fi

            if ! command -v npm &> /dev/null; then
              echo "Error: npm no encontrado."
              exit 1
            fi

            APP_DIR="$HOME/$ARG_REPO_NAME"

            cd "$APP_DIR"
            git fetch origin
            git reset --hard "$ARG_GIT_COMMIT_SHA"

            ENV_FILE_BACKEND="$APP_DIR/backend/src/config/.env"
            ENV_FILE_FRONTEND="$APP_DIR/frontend/.env"

            if [ ! -f "$ENV_FILE_BACKEND" ]; then
              echo "ERROR: No se encontró el .env del backend en $ENV_FILE_BACKEND"
              exit 1
            else
              echo "Archivo .env de backend encontrado."
            fi

            if [ ! -f "$ENV_FILE_FRONTEND" ]; then
              echo "ERROR: No se encontró el .env del frontend en $ENV_FILE_FRONTEND"
              exit 1
            else
              echo "Archivo .env de frontend encontrado."
            fi

            cd "$APP_DIR/backend"
            npm ci

            pm2 restart app-backend || pm2 start src/index.js --name "app-backend"

            cd "$APP_DIR/frontend"
            npm ci
            npm run build

            pm2 restart app-frontend || pm2 start npm --name "app-frontend" -- run preview

            echo "Despliegue completado en $(date)"
          EOF

      - name: Limpieza final VPN
        if: always()
        run: |
          sudo pkill openvpn || true
